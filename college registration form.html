<!DOCTYPE html>
<html>
<head>
    <title>Student Registration</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background-image: url(college.jpg);
            background-repeat: no-repeat;
            background-size: cover;
        }

        .form-container{
            width: 400px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
        }
        h2{
            text-align: center;
        }
        input, select{
            width: 100%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button{
            width: 100%;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #0056b3;
        }
        .bm{
            text-align: center;
            color: white;
            background-color: beige;

        }
    </style>
</head>

<body>
<marquee style="background-color: #ccc;"><h1>BM Institute of Engineering and Technology</h1></marquee>
<h3 class="bm" style="color: black;">Welcome to Student Registration Portal</h3>
<div class="form-container">
    <h4>Student Registration</h4>

    <form>
        <label>Full Name</label>
        <input type="text" placeholder="Enter your name" required>

        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>

        <label>Phone Number</label>
        <input type="tel" placeholder="Enter phone number" required>
        <label>Gender</label>
        <select>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>
        <label>12th Cutoff</label>
        <input type="number" placeholder="Enter 12th cutoff" required>
        <label>Course</label>
        <select>
            <option value="">Select Course</option>
            <option>CSE</option>
            <option>ECE</option>
            <option>EEE</option>
            <option>AIDS</option>
            <option>IT</option>
            <option>CIVIL</option>
        </select>

        <label>Date of Birth</label>
        <input type="date">

        <button type="submit">SUBMIT</button>
    </form>
</div>

</body>
</html>]
